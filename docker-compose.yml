services:

  postgres:
    image: postgres:16-alpine
    container_name: feima_postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  admin_panel:
    build:
      context: .
      dockerfile: admin_panel/Dockerfile
    container_name: feima_admin
    env_file: .env
    environment:
      DB_HOST: postgres
    volumes:
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',8000)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: feima_bot
    env_file: .env
    environment:
      DB_HOST: postgres
      MEDIA_ROOT: /app/media
    volumes:
      - media_files:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      admin_panel:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  media_files:
